<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fluido Interativo — WebGL</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #050507;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
  }

  /* fundo minimalista: leve vinheta radial atrás do canvas */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: 0;
    background: radial-gradient(circle at 50% 45%, #0c0f16 0%, #050507 70%);
  }

  #fluid-canvas {
    position: fixed;
    inset: 0;
    z-index: 1;
    width: 100%;
    height: 100%;
    display: block;
    cursor: crosshair;
  }

  .hint {
    position: fixed;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    color: rgba(255, 255, 255, 0.38);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    pointer-events: none;
    user-select: none;
    transition: opacity 0.6s ease;
  }

  .hint.fade { opacity: 0; }

  .fallback {
    position: fixed;
    inset: 0;
    z-index: 3;
    display: none;
    align-items: center;
    justify-content: center;
    color: rgba(255, 255, 255, 0.6);
    font-size: 14px;
    text-align: center;
    padding: 24px;
  }
</style>
</head>
<body>

  <canvas id="fluid-canvas"></canvas>
  <p class="hint" id="hint">mova o mouse para empurrar &nbsp;•&nbsp; clique e arraste para atrair</p>
  <div class="fallback" id="fallback">
    Seu navegador não suporta os recursos WebGL necessários para esta animação.
  </div>

<script>
"use strict";

/* ════════════════════════════════════════════════════════════════════════
   CONFIGURAÇÃO — mude os valores aqui para ajustar cores, intensidade e
   velocidade do fluido. Nenhuma outra parte do código precisa ser tocada.
   ════════════════════════════════════════════════════════════════════════ */
const CONFIG = {
  // Resolução da grade de simulação física (velocidade/pressão).
  // Menor = mais rápido, porém menos detalhe nos vórtices. 64–192 é um bom intervalo.
  SIM_RESOLUTION: 128,

  // Resolução do campo de cor (o que de fato se vê na tela).
  // Pode ser bem maior que SIM_RESOLUTION sem custar muito desempenho.
  DYE_RESOLUTION: 1024,

  // Quanto tempo o rastro de cor leva para desaparecer. 1.0 = nunca dissipa.
  // Valores menores → fluido "mais fino"/rápido para sumir.
  DENSITY_DISSIPATION: 0.985,

  // Quanto tempo o MOVIMENTO continua depois que o mouse para/sai da tela.
  // Mais perto de 1.0 = mais "viscoso" (o fluido continua se movendo por mais tempo).
  VELOCITY_DISSIPATION: 0.992,

  // Dissipação da pressão entre os frames (estabilidade do solver). Raramente precisa mudar.
  PRESSURE_DISSIPATION: 0.8,

  // Iterações do solver de pressão. Mais = fisicamente mais correto, porém mais pesado.
  PRESSURE_ITERATIONS: 25,

  // Intensidade dos vórtices/redemoinhos — é o que dá o aspecto "orgânico" às ondas.
  // 0 = movimento liso e mecânico. 15–40 = ondulações naturais.
  CURL_STRENGTH: 26,

  // Raio (tamanho) da "pegada" que o cursor deixa no fluido a cada movimento.
  SPLAT_RADIUS: 0.22,

  // Força aplicada ao mover o mouse (efeito de "empurrar" o líquido).
  SPLAT_FORCE: 5200,

  // Força aplicada continuamente enquanto o botão do mouse está pressionado
  // (efeito de "atrair"/sugar o líquido para o cursor).
  ATTRACT_FORCE: 4200,

  // Paleta de cores do fluido — adicione, remova ou troque cores livremente.
  // Cada cor é [vermelho, verde, azul] de 0 a 1.
  COLOR_PALETTE: [
    [0.10, 0.45, 0.95], // azul
    [0.15, 0.80, 0.85], // ciano
    [0.55, 0.25, 0.95], // violeta
    [0.95, 0.35, 0.65], // rosa
  ],

  // Velocidade com que a cor do "jato" percorre a paleta acima ao longo do tempo.
  COLOR_CYCLE_SPEED: 0.12,

  // Quanto cada respingo de cor contribui de intensidade (evita estourar o brilho).
  COLOR_INTENSITY: 0.28,

  // Cor de fundo por trás do fluido (RGB de 0 a 1).
  BACKGROUND_COLOR: [0.02, 0.02, 0.035],

  // Limite de pixel ratio (telas retina). Maior = mais nítido, porém mais pesado.
  MAX_DPR: 1.5,
};

/* ════════════════════════════════════════════════════════════════════════
   SETUP DO WEBGL
   ════════════════════════════════════════════════════════════════════════ */
const canvas = document.getElementById("fluid-canvas");
const hint = document.getElementById("hint");
const fallbackEl = document.getElementById("fallback");

function getWebGLContext(canvas) {
  const params = { alpha: false, depth: false, stencil: false, antialias: false, preserveDrawingBuffer: false };

  let gl = canvas.getContext("webgl2", params);
  const isWebGL2 = !!gl;
  if (!isWebGL2) {
    gl = canvas.getContext("webgl", params) || canvas.getContext("experimental-webgl", params);
  }
  if (!gl) return null;

  let halfFloatTexType, formatRGBA, supportLinearFiltering;

  if (isWebGL2) {
    gl.getExtension("EXT_color_buffer_float");
    supportLinearFiltering = !!gl.getExtension("OES_texture_float_linear");
    halfFloatTexType = gl.HALF_FLOAT;
    formatRGBA = gl.RGBA16F;
  } else {
    const halfFloat = gl.getExtension("OES_texture_half_float");
    supportLinearFiltering = !!gl.getExtension("OES_texture_half_float_linear");
    halfFloatTexType = halfFloat ? halfFloat.HALF_FLOAT_OES : null;
    formatRGBA = gl.RGBA;
  }

  if (!halfFloatTexType) return null;

  // Confirma que conseguimos de fato renderizar nesse formato.
  const testTex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, testTex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texImage2D(gl.TEXTURE_2D, 0, isWebGL2 ? formatRGBA : gl.RGBA, 4, 4, 0, gl.RGBA, halfFloatTexType, null);

  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, testTex, 0);
  const ok = gl.checkFramebufferStatus(gl.FRAMEBUFFER) === gl.FRAMEBUFFER_COMPLETE;
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.deleteFramebuffer(fbo);
  gl.deleteTexture(testTex);
  if (!ok) return null;

  return { gl, isWebGL2, halfFloatTexType, formatRGBA, supportLinearFiltering };
}

const webgl = getWebGLContext(canvas);
if (!webgl) {
  fallbackEl.style.display = "flex";
  hint.style.display = "none";
  throw new Error("WebGL com texturas de ponto flutuante não disponível.");
}
const { gl, isWebGL2, halfFloatTexType, formatRGBA, supportLinearFiltering } = webgl;
const texFilter = supportLinearFiltering ? gl.LINEAR : gl.NEAREST;

/* Define o tamanho real do canvas ANTES de calcular a resolução das texturas
   de simulação — sem isso, a proporção (aspect ratio) ficaria errada,
   calculada com base no tamanho padrão (300×150) do elemento <canvas>. */
function applyCanvasSize() {
  const dpr = Math.min(window.devicePixelRatio || 1, CONFIG.MAX_DPR);
  const w = Math.round(window.innerWidth * dpr);
  const h = Math.round(window.innerHeight * dpr);
  const changed = canvas.width !== w || canvas.height !== h;
  canvas.width = w;
  canvas.height = h;
  return changed;
}
applyCanvasSize();

/* ════════════════════════════════════════════════════════════════════════
   SHADERS
   ════════════════════════════════════════════════════════════════════════ */
const baseVertexShader = `
  precision highp float;
  attribute vec2 aPosition;
  varying vec2 vUv, vL, vR, vT, vB;
  uniform vec2 texelSize;
  void main () {
    vUv = aPosition * 0.5 + 0.5;
    vL = vUv - vec2(texelSize.x, 0.0);
    vR = vUv + vec2(texelSize.x, 0.0);
    vT = vUv + vec2(0.0, texelSize.y);
    vB = vUv - vec2(0.0, texelSize.y);
    gl_Position = vec4(aPosition, 0.0, 1.0);
  }
`;

const splatShader = `
  precision highp float;
  varying vec2 vUv;
  uniform sampler2D uTarget;
  uniform float aspectRatio;
  uniform vec3 value;
  uniform vec2 point;
  uniform float radius;
  uniform float radial;
  void main () {
    vec2 p = vUv - point;
    p.x *= aspectRatio;
    float falloff = exp(-dot(p, p) / radius);
    vec2 toCenter = -p / (length(p) + 1e-5);
    vec2 radialForce = toCenter * length(value.xy);
    vec3 finalValue = vec3(mix(value.xy, radialForce, radial), value.z);
    vec3 base = texture2D(uTarget, vUv).xyz;
    gl_FragColor = vec4(base + finalValue * falloff, 1.0);
  }
`;

const advectionShader = `
  precision highp float;
  varying vec2 vUv;
  uniform sampler2D uVelocity;
  uniform sampler2D uSource;
  uniform vec2 texelSize;
  uniform float dt;
  uniform float dissipation;
  void main () {
    vec2 coord = vUv - dt * texture2D(uVelocity, vUv).xy * texelSize;
    gl_FragColor = dissipation * texture2D(uSource, coord);
  }
`;

const divergenceShader = `
  precision highp float;
  varying vec2 vUv, vL, vR, vT, vB;
  uniform sampler2D uVelocity;
  void main () {
    float L = texture2D(uVelocity, vL).x;
    float R = texture2D(uVelocity, vR).x;
    float T = texture2D(uVelocity, vT).y;
    float B = texture2D(uVelocity, vB).y;
    float div = 0.5 * (R - L + T - B);
    gl_FragColor = vec4(div, 0.0, 0.0, 1.0);
  }
`;

const curlShader = `
  precision highp float;
  varying vec2 vUv, vL, vR, vT, vB;
  uniform sampler2D uVelocity;
  void main () {
    float L = texture2D(uVelocity, vL).y;
    float R = texture2D(uVelocity, vR).y;
    float T = texture2D(uVelocity, vT).x;
    float B = texture2D(uVelocity, vB).x;
    float vorticity = R - L - T + B;
    gl_FragColor = vec4(0.5 * vorticity, 0.0, 0.0, 1.0);
  }
`;

const vorticityShader = `
  precision highp float;
  varying vec2 vUv, vL, vR, vT, vB;
  uniform sampler2D uVelocity;
  uniform sampler2D uCurl;
  uniform float curlStrength;
  uniform float dt;
  void main () {
    float L = texture2D(uCurl, vL).x;
    float R = texture2D(uCurl, vR).x;
    float T = texture2D(uCurl, vT).x;
    float B = texture2D(uCurl, vB).x;
    float C = texture2D(uCurl, vUv).x;
    vec2 force = 0.5 * vec2(abs(T) - abs(B), abs(R) - abs(L));
    force /= length(force) + 1e-5;
    force *= curlStrength * C;
    force.y *= -1.0;
    vec2 vel = texture2D(uVelocity, vUv).xy;
    gl_FragColor = vec4(vel + force * dt, 0.0, 1.0);
  }
`;

const pressureShader = `
  precision highp float;
  varying vec2 vUv, vL, vR, vT, vB;
  uniform sampler2D uPressure;
  uniform sampler2D uDivergence;
  void main () {
    float L = texture2D(uPressure, vL).x;
    float R = texture2D(uPressure, vR).x;
    float T = texture2D(uPressure, vT).x;
    float B = texture2D(uPressure, vB).x;
    float divergence = texture2D(uDivergence, vUv).x;
    float pressure = (L + R + B + T - divergence) * 0.25;
    gl_FragColor = vec4(pressure, 0.0, 0.0, 1.0);
  }
`;

const gradientSubtractShader = `
  precision highp float;
  varying vec2 vUv, vL, vR, vT, vB;
  uniform sampler2D uPressure;
  uniform sampler2D uVelocity;
  void main () {
    float L = texture2D(uPressure, vL).x;
    float R = texture2D(uPressure, vR).x;
    float T = texture2D(uPressure, vT).x;
    float B = texture2D(uPressure, vB).x;
    vec2 velocity = texture2D(uVelocity, vUv).xy;
    velocity -= vec2(R - L, T - B);
    gl_FragColor = vec4(velocity, 0.0, 1.0);
  }
`;

const clearShader = `
  precision highp float;
  varying vec2 vUv;
  uniform sampler2D uTexture;
  uniform float value;
  void main () {
    gl_FragColor = value * texture2D(uTexture, vUv);
  }
`;

const displayShader = `
  precision highp float;
  varying vec2 vUv, vL, vR, vT, vB;
  uniform sampler2D uTexture;
  uniform vec3 uBackgroundColor;
  void main () {
    vec3 c = texture2D(uTexture, vUv).rgb;

    float lL = dot(texture2D(uTexture, vL).rgb, vec3(0.299, 0.587, 0.114));
    float lR = dot(texture2D(uTexture, vR).rgb, vec3(0.299, 0.587, 0.114));
    float lT = dot(texture2D(uTexture, vT).rgb, vec3(0.299, 0.587, 0.114));
    float lB = dot(texture2D(uTexture, vB).rgb, vec3(0.299, 0.587, 0.114));

    /* normal aproximada a partir do relevo de luminância — dá profundidade de água */
    vec3 normal = normalize(vec3(lL - lR, lB - lT, 0.62));
    vec3 lightDir = normalize(vec3(0.35, 0.45, 0.85));
    float diffuse = max(dot(normal, lightDir), 0.0);
    float specular = pow(max(dot(reflect(-lightDir, normal), vec3(0.0, 0.0, 1.0)), 0.0), 26.0);

    vec3 base = mix(uBackgroundColor, c, clamp(length(c) * 1.5, 0.0, 1.0));
    vec3 lit = base * (0.55 + diffuse * 0.7) + vec3(1.0) * specular * 0.85;

    gl_FragColor = vec4(lit, 1.0);
  }
`;

/* ════════════════════════════════════════════════════════════════════════
   HELPERS DE COMPILAÇÃO / PROGRAMA
   ════════════════════════════════════════════════════════════════════════ */
function compileShader(type, source) {
  const shader = gl.createShader(type);
  gl.shaderSource(shader, source);
  gl.compileShader(shader);
  if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(shader));
  }
  return shader;
}

function createProgram(vertexSource, fragmentSource) {
  const program = gl.createProgram();
  gl.attachShader(program, compileShader(gl.VERTEX_SHADER, vertexSource));
  gl.attachShader(program, compileShader(gl.FRAGMENT_SHADER, fragmentSource));
  gl.linkProgram(program);
  if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
    console.error(gl.getProgramInfoLog(program));
  }

  const uniforms = {};
  const uniformCount = gl.getProgramParameter(program, gl.ACTIVE_UNIFORMS);
  for (let i = 0; i < uniformCount; i++) {
    const name = gl.getActiveUniform(program, i).name;
    uniforms[name] = gl.getUniformLocation(program, name);
  }
  return { program, uniforms };
}

function useProgram(p) {
  gl.useProgram(p.program);
  return p;
}

/* quad fullscreen compartilhado por todos os passes */
const quadVertexBuffer = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quadVertexBuffer);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, -1, 1, 1, 1, 1, -1]), gl.STATIC_DRAW);
const quadIndexBuffer = gl.createBuffer();
gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, quadIndexBuffer);
gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array([0, 1, 2, 0, 2, 3]), gl.STATIC_DRAW);
gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);
gl.enableVertexAttribArray(0);

function blit(target) {
  if (target == null) {
    gl.viewport(0, 0, gl.drawingBufferWidth, gl.drawingBufferHeight);
    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  } else {
    gl.viewport(0, 0, target.width, target.height);
    gl.bindFramebuffer(gl.FRAMEBUFFER, target.fbo);
  }
  gl.drawElements(gl.TRIANGLES, 6, gl.UNSIGNED_SHORT, 0);
}

const programs = {
  splat: createProgram(baseVertexShader, splatShader),
  advection: createProgram(baseVertexShader, advectionShader),
  divergence: createProgram(baseVertexShader, divergenceShader),
  curl: createProgram(baseVertexShader, curlShader),
  vorticity: createProgram(baseVertexShader, vorticityShader),
  pressure: createProgram(baseVertexShader, pressureShader),
  gradientSubtract: createProgram(baseVertexShader, gradientSubtractShader),
  clear: createProgram(baseVertexShader, clearShader),
  display: createProgram(baseVertexShader, displayShader),
};

/* ════════════════════════════════════════════════════════════════════════
   FRAMEBUFFERS (texturas de simulação)
   ════════════════════════════════════════════════════════════════════════ */
function createFBO(w, h) {
  gl.activeTexture(gl.TEXTURE0);
  const texture = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, texture);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, texFilter);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, texFilter);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texImage2D(gl.TEXTURE_2D, 0, isWebGL2 ? formatRGBA : gl.RGBA, w, h, 0, gl.RGBA, halfFloatTexType, null);

  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, texture, 0);
  gl.viewport(0, 0, w, h);
  gl.clear(gl.COLOR_BUFFER_BIT);

  return {
    texture, fbo, width: w, height: h,
    attach(unit) {
      gl.activeTexture(gl.TEXTURE0 + unit);
      gl.bindTexture(gl.TEXTURE_2D, texture);
      return unit;
    },
  };
}

function createDoubleFBO(w, h) {
  let fbo1 = createFBO(w, h);
  let fbo2 = createFBO(w, h);
  return {
    width: w, height: h,
    get read() { return fbo1; },
    get write() { return fbo2; },
    swap() { const tmp = fbo1; fbo1 = fbo2; fbo2 = tmp; },
  };
}

function getResolution(resolution) {
  const aspect = gl.drawingBufferWidth / gl.drawingBufferHeight;
  const a = aspect < 1 ? 1 / aspect : aspect;
  const max = Math.round(resolution * a);
  const min = Math.round(resolution);
  return aspect < 1 ? { width: min, height: max } : { width: max, height: min };
}

let simRes = getResolution(CONFIG.SIM_RESOLUTION);
let dyeRes = getResolution(CONFIG.DYE_RESOLUTION);

let velocity = createDoubleFBO(simRes.width, simRes.height);
let dye = createDoubleFBO(dyeRes.width, dyeRes.height);
let divergence = createFBO(simRes.width, simRes.height);
let curlFBO = createFBO(simRes.width, simRes.height);
let pressure = createDoubleFBO(simRes.width, simRes.height);

/* ════════════════════════════════════════════════════════════════════════
   ENTRADA DO USUÁRIO (mouse / toque)
   ════════════════════════════════════════════════════════════════════════ */
const pointers = new Map();

function makePointer() {
  return { x: 0, y: 0, dx: 0, dy: 0, down: false, moved: false, color: [1, 1, 1] };
}

function getSplatColor(t) {
  const palette = CONFIG.COLOR_PALETTE;
  const pos = (t * CONFIG.COLOR_CYCLE_SPEED) % palette.length;
  const i = Math.floor(pos);
  const f = pos - i;
  const a = palette[i];
  const b = palette[(i + 1) % palette.length];
  return [
    (a[0] + (b[0] - a[0]) * f) * CONFIG.COLOR_INTENSITY,
    (a[1] + (b[1] - a[1]) * f) * CONFIG.COLOR_INTENSITY,
    (a[2] + (b[2] - a[2]) * f) * CONFIG.COLOR_INTENSITY,
  ];
}

function updatePointerFromEvent(id, clientX, clientY, isDown) {
  const rect = canvas.getBoundingClientRect();
  const x = (clientX - rect.left) / rect.width;
  const y = 1.0 - (clientY - rect.top) / rect.height;

  let p = pointers.get(id);
  if (!p) {
    p = makePointer();
    p.x = x; p.y = y;
    pointers.set(id, p);
  }
  p.dx = (x - p.x) * 8.0;
  p.dy = (y - p.y) * 8.0;
  p.x = x; p.y = y;
  p.moved = Math.abs(p.dx) > 0 || Math.abs(p.dy) > 0;
  if (isDown !== undefined) p.down = isDown;

  hint.classList.add("fade");
}

canvas.addEventListener("pointerdown", (e) => {
  updatePointerFromEvent(e.pointerId, e.clientX, e.clientY, true);
});
window.addEventListener("pointermove", (e) => {
  if (pointers.has(e.pointerId) || e.pointerType !== "touch") {
    updatePointerFromEvent(e.pointerId, e.clientX, e.clientY);
  }
});
window.addEventListener("pointerup", (e) => {
  const p = pointers.get(e.pointerId);
  if (p) p.down = false;
});
window.addEventListener("pointercancel", (e) => {
  const p = pointers.get(e.pointerId);
  if (p) p.down = false;
});
canvas.addEventListener("touchmove", (e) => e.preventDefault(), { passive: false });

/* ════════════════════════════════════════════════════════════════════════
   PASSES DE SIMULAÇÃO
   ════════════════════════════════════════════════════════════════════════ */
function splat(target, x, y, dx, dy, dz, radial) {
  useProgram(programs.splat);
  gl.uniform1i(programs.splat.uniforms.uTarget, target.read.attach(0));
  gl.uniform1f(programs.splat.uniforms.aspectRatio, canvas.width / canvas.height);
  gl.uniform2f(programs.splat.uniforms.point, x, y);
  gl.uniform3f(programs.splat.uniforms.value, dx, dy, dz);
  gl.uniform1f(programs.splat.uniforms.radius, CONFIG.SPLAT_RADIUS / 100.0);
  gl.uniform1f(programs.splat.uniforms.radial, radial ? 1.0 : 0.0);
  blit(target.write);
  target.swap();
}

let timeAccum = 0;

function applyInputs(dt) {
  pointers.forEach((p) => {
    if (p.moved) {
      const color = getSplatColor(timeAccum);
      splat(velocity, p.x, p.y, p.dx * CONFIG.SPLAT_FORCE, p.dy * CONFIG.SPLAT_FORCE, 0, false);
      splat(dye, p.x, p.y, color[0], color[1], color[2], false);
      p.moved = false;
    }
    if (p.down) {
      /* sucção contínua enquanto o botão estiver pressionado — efeito de "atrair" */
      splat(velocity, p.x, p.y, CONFIG.ATTRACT_FORCE, 0, 0, true);
      const color = getSplatColor(timeAccum);
      splat(dye, p.x, p.y, color[0] * 0.4, color[1] * 0.4, color[2] * 0.4, false);
    }
  });
}

function step(dt) {
  gl.disable(gl.BLEND);

  /* vorticidade — adiciona redemoinhos orgânicos ao campo de velocidade */
  useProgram(programs.curl);
  gl.uniform2f(programs.curl.uniforms.texelSize, 1.0 / simRes.width, 1.0 / simRes.height);
  gl.uniform1i(programs.curl.uniforms.uVelocity, velocity.read.attach(0));
  blit(curlFBO);

  useProgram(programs.vorticity);
  gl.uniform2f(programs.vorticity.uniforms.texelSize, 1.0 / simRes.width, 1.0 / simRes.height);
  gl.uniform1i(programs.vorticity.uniforms.uVelocity, velocity.read.attach(0));
  gl.uniform1i(programs.vorticity.uniforms.uCurl, curlFBO.attach(1));
  gl.uniform1f(programs.vorticity.uniforms.curlStrength, CONFIG.CURL_STRENGTH);
  gl.uniform1f(programs.vorticity.uniforms.dt, dt);
  blit(velocity.write);
  velocity.swap();

  /* divergência + solução de pressão (Jacobi) — mantém o fluido incompressível */
  useProgram(programs.divergence);
  gl.uniform2f(programs.divergence.uniforms.texelSize, 1.0 / simRes.width, 1.0 / simRes.height);
  gl.uniform1i(programs.divergence.uniforms.uVelocity, velocity.read.attach(0));
  blit(divergence);

  useProgram(programs.clear);
  gl.uniform1i(programs.clear.uniforms.uTexture, pressure.read.attach(0));
  gl.uniform1f(programs.clear.uniforms.value, CONFIG.PRESSURE_DISSIPATION);
  blit(pressure.write);
  pressure.swap();

  useProgram(programs.pressure);
  gl.uniform2f(programs.pressure.uniforms.texelSize, 1.0 / simRes.width, 1.0 / simRes.height);
  gl.uniform1i(programs.pressure.uniforms.uDivergence, divergence.attach(0));
  for (let i = 0; i < CONFIG.PRESSURE_ITERATIONS; i++) {
    gl.uniform1i(programs.pressure.uniforms.uPressure, pressure.read.attach(1));
    blit(pressure.write);
    pressure.swap();
  }

  useProgram(programs.gradientSubtract);
  gl.uniform2f(programs.gradientSubtract.uniforms.texelSize, 1.0 / simRes.width, 1.0 / simRes.height);
  gl.uniform1i(programs.gradientSubtract.uniforms.uPressure, pressure.read.attach(0));
  gl.uniform1i(programs.gradientSubtract.uniforms.uVelocity, velocity.read.attach(1));
  blit(velocity.write);
  velocity.swap();

  /* advecção — transporta velocidade e cor pelo próprio campo de velocidade */
  useProgram(programs.advection);
  gl.uniform2f(programs.advection.uniforms.texelSize, 1.0 / simRes.width, 1.0 / simRes.height);
  gl.uniform1i(programs.advection.uniforms.uVelocity, velocity.read.attach(0));
  gl.uniform1i(programs.advection.uniforms.uSource, velocity.read.attach(0));
  gl.uniform1f(programs.advection.uniforms.dt, dt);
  gl.uniform1f(programs.advection.uniforms.dissipation, CONFIG.VELOCITY_DISSIPATION);
  blit(velocity.write);
  velocity.swap();

  gl.uniform2f(programs.advection.uniforms.texelSize, 1.0 / dyeRes.width, 1.0 / dyeRes.height);
  gl.uniform1i(programs.advection.uniforms.uVelocity, velocity.read.attach(0));
  gl.uniform1i(programs.advection.uniforms.uSource, dye.read.attach(1));
  gl.uniform1f(programs.advection.uniforms.dissipation, CONFIG.DENSITY_DISSIPATION);
  blit(dye.write);
  dye.swap();
}

function render() {
  useProgram(programs.display);
  gl.uniform1i(programs.display.uniforms.uTexture, dye.read.attach(0));
  gl.uniform3f(programs.display.uniforms.uBackgroundColor, ...CONFIG.BACKGROUND_COLOR);
  blit(null);
}

/* ════════════════════════════════════════════════════════════════════════
   REDIMENSIONAMENTO
   ════════════════════════════════════════════════════════════════════════ */
function resizeCanvas() {
  if (applyCanvasSize()) {
    dyeRes = getResolution(CONFIG.DYE_RESOLUTION);
    dye = createDoubleFBO(dyeRes.width, dyeRes.height);
  }
}
window.addEventListener("resize", resizeCanvas, { passive: true });

/* Perda de contexto WebGL é rara (driver/GPU reiniciando, aba em segundo
   plano por muito tempo etc.), mas se acontecer o ideal é recarregar a
   página em vez de continuar desenhando num contexto morto. */
let contextLost = false;
canvas.addEventListener("webglcontextlost", (e) => {
  e.preventDefault();
  contextLost = true;
});
canvas.addEventListener("webglcontextrestored", () => {
  window.location.reload();
});

/* ════════════════════════════════════════════════════════════════════════
   LOOP PRINCIPAL (60 FPS via requestAnimationFrame)
   ════════════════════════════════════════════════════════════════════════ */
let lastTime = performance.now();

function loop() {
  if (contextLost) return;

  const now = performance.now();
  const dt = Math.min((now - lastTime) / 1000, 1 / 30); // limita picos em abas pausadas
  lastTime = now;
  timeAccum += dt;

  applyInputs(dt);
  step(dt);
  render();

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
